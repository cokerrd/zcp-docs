name: 'Setup Node.js'
description: 'Setup Node.js + pnpm (via corepack) and install dependencies (requires checkout first)'

inputs:
  node-version:
    description: 'Node.js version to use'
    required: false
    default: '22'

runs:
  using: 'composite'
  steps:
    # pnpm is provided by corepack (a Node built-in) which reads the version
    # from the "packageManager" field in package.json. This avoids
    # pnpm/action-setup, which still targets Node 20 and emits a deprecation
    # warning. Every action below is Node-24-native.
    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: ${{ inputs.node-version }}

    - name: Enable pnpm via corepack
      shell: bash
      run: corepack enable

    - name: Resolve pnpm store path
      id: pnpm-store
      shell: bash
      run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

    - name: Cache pnpm store
      uses: actions/cache@v4
      with:
        path: ${{ steps.pnpm-store.outputs.path }}
        key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: ${{ runner.os }}-pnpm-

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
